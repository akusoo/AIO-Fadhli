name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

permissions:
  contents: read
  deployments: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify-fast:
    name: Verify Fast
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test:unit -- --coverage
        env:
          VITEST_COVERAGE_DIR: test-results/vitest/unit/coverage
          VITEST_JUNIT_FILE: test-results/vitest/unit/junit.xml

      - name: Component tests
        run: pnpm test:component -- --coverage
        env:
          VITEST_COVERAGE_DIR: test-results/vitest/component/coverage
          VITEST_JUNIT_FILE: test-results/vitest/component/junit.xml

      - name: Contract tests
        run: pnpm test:contracts -- --coverage
        env:
          VITEST_COVERAGE_DIR: test-results/vitest/contracts/coverage
          VITEST_JUNIT_FILE: test-results/vitest/contracts/junit.xml

      - name: Upload fast-suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: verify-fast-artifacts
          path: test-results/vitest
          if-no-files-found: ignore

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: verify-fast
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build app
        run: pnpm build

  integration-db:
    name: Integration DB
    runs-on: ubuntu-latest
    needs: verify-fast
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      TEST_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}-integration

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run hosted Supabase integration suite
        run: pnpm test:integration -- --coverage
        env:
          VITEST_COVERAGE_DIR: test-results/vitest/integration/coverage
          VITEST_JUNIT_FILE: test-results/vitest/integration/junit.xml

      - name: Upload integration artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-db-artifacts
          path: test-results/vitest/integration
          if-no-files-found: ignore

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: verify-fast
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_ROLE_KEY }}
      E2E_TEST_SECRET: ${{ secrets.TEST_E2E_TEST_SECRET }}
      E2E_TEST_EMAIL: ${{ secrets.TEST_E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.TEST_E2E_TEST_PASSWORD }}
      TEST_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}-smoke
      PLAYWRIGHT_RETRIES: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run local smoke E2E
        run: pnpm test:e2e:smoke

      - name: Run investment workflow focus
        run: pnpm exec playwright test --grep @investments

      - name: Upload Playwright smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-smoke-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  preview-smoke:
    name: Preview Smoke
    runs-on: ubuntu-latest
    needs: verify-fast
    if: github.event_name == 'pull_request'
    env:
      E2E_TEST_SECRET: ${{ secrets.TEST_E2E_TEST_SECRET }}
      TEST_RUN_ID: gha-${{ github.run_id }}-${{ github.run_attempt }}-preview
      PLAYWRIGHT_RETRIES: 1

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Vercel preview deployment
        id: preview
        run: node scripts/ci/wait-for-preview.mjs
        env:
          GITHUB_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
          PREVIEW_TIMEOUT_MS: 900000

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run preview smoke tests
        run: pnpm test:e2e:smoke
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.preview_url }}

      - name: Run preview investment workflow focus
        run: pnpm exec playwright test --grep @investments
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.preview.outputs.preview_url }}

      - name: Upload preview smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: preview-smoke-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
