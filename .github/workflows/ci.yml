name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  quality:
    name: Quality Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}

  e2e:
    name: End-to-End
    runs-on: ubuntu-latest
    needs: quality
    env:
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      E2E_TEST_SECRET: ${{ secrets.E2E_TEST_SECRET }}
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Decide whether E2E can run
        id: e2e-guard
        run: |
          if [ -n "${NEXT_PUBLIC_SUPABASE_URL}" ] && [ -n "${NEXT_PUBLIC_SUPABASE_ANON_KEY}" ] && [ -n "${SUPABASE_SERVICE_ROLE_KEY}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "E2E secrets are present. Full Playwright suite will run."
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "E2E secrets are missing. Playwright suite will be skipped."
          fi

      - name: Install dependencies
        if: steps.e2e-guard.outputs.enabled == 'true'
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        if: steps.e2e-guard.outputs.enabled == 'true'
        run: pnpm exec playwright install --with-deps chromium

      - name: Run end-to-end tests
        if: steps.e2e-guard.outputs.enabled == 'true'
        run: pnpm e2e

      - name: Upload Playwright artifacts
        if: always() && steps.e2e-guard.outputs.enabled == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: playwright-artifacts
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Note skipped E2E
        if: steps.e2e-guard.outputs.enabled != 'true'
        run: echo "Skipping E2E because required Supabase secrets are not configured in GitHub Actions."
